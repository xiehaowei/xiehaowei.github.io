<meta name="description" content="import java.util.*; //快排的实现 public class quikSort{ //(1)递归实现快速排序 public static void quickSort(int[]s,int l,int r){ if(l&lt;r) { int i=l; int j=r; int pivot=s[l]; //取每个子数组的第一个数为基点 while(i&lt;j) { while(i&lt;j&amp;&amp;s[j]&gt;pivot) //从右向左 j--; if(j&gt;i) { s[i++]=s[j]; } while(i&lt;j&amp;&amp;s[i]&lt;pivot) //从左向右 i++; if(i&lt;j) { s[j--]=s[i]; } } s[i]=pivot; quickSort(s,l,i-1); quickSort(s,i+1,r); } } //非递归实现快速排序 public static void NonRecQuickSort(int[] a,int start,int end) { LinkedList&lt;Integer&gt; stack = new LinkedList&lt;Integer&gt;(); //用栈模拟 if(start &lt; end) { stack.push(end); stack.push(start); while(!stack.isEmpty()) { int l = stack.pop(); int r = stack.pop(); int index = partition(a, l, r); if(l &lt; index - 1) { stack.push(index-1); stack.push(l); } if(r &gt; index + 1) { stack.push(r); stack.push(index+1); } } } } public static int partition(int[] a, int start, int end) { int pivot = a[start]; while(start &lt; end) { while(start &lt; end &amp;&amp; a[end] &gt;= pivot) end--; a[start] = a[end]; while(start &lt; end &amp;&amp; a[start] &lt;= pivot) start++; a[end] = a[start]; } a[start] = pivot; return start; } //打印数组的值 public static void PrintArray(int[]arr) { for(int i=0;i&lt;arr.length;i++) { System.out.print(arr[i]+&quot; &quot;); } System.out.println(); } public static void main(String[]args) { int[]arr={3,6,5,2,5,4,3,8}; PrintArray(arr); //quickSort(arr,0,arr.length-1); NonRecQuickSort(arr,0,arr.length-1); PrintArray(arr); } }" />

 <span class="kd">public</span> <span class="kd">static</span> <span class="kt">void</span> <span class="nf">NonRecQuickSort</span><span class="o">(</span><span class="kt">int</span><span class="o">[]</span> <span class="n">a</span><span class="o">,</span><span class="kt">int</span> <span class="n">start</span><span class="o">,</span><span class="kt">int</span> <span class="n">end</span><span class="o">)</span> <span class="o">{</span>
